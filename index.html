<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AgentMail AI – Autonomous Email Marketing Agent</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
      // Suppress benign HMR/Vite websocket connection failure overlays by mocking HMR WebSocket
      (function() {
        const OriginalWebSocket = window.WebSocket;
        if (OriginalWebSocket) {
          window.WebSocket = function(url, protocols) {
            const urlStr = String(url || '');
            if (urlStr.includes('/vite') || urlStr.includes('ws://') || urlStr.includes('wss://')) {
              console.log('Agent HMR WebSocket Mock active: Intercepted connection to:', urlStr);
              const dummy = {
                url: urlStr,
                readyState: 0, // CONNECTING
                send: function() {},
                close: function() {},
                addEventListener: function(type, callback) {
                  if (type === 'open') {
                    setTimeout(() => {
                      dummy.readyState = 1; // OPEN
                      if (typeof callback === 'function') callback({ type: 'open' });
                    }, 50);
                  }
                },
                removeEventListener: function() {},
                onopen: null,
                onclose: null,
                onerror: null,
                onmessage: null
              };
              return dummy;
            }
            return new OriginalWebSocket(url, protocols);
          };
          window.WebSocket.prototype = OriginalWebSocket.prototype;
          // Keep references intact
          window.WebSocket.CONNECTING = OriginalWebSocket.CONNECTING;
          window.WebSocket.OPEN = OriginalWebSocket.OPEN;
          window.WebSocket.CLOSING = OriginalWebSocket.CLOSING;
          window.WebSocket.CLOSED = OriginalWebSocket.CLOSED;
        }

        // Trap and suppress any residual web socket / HMR unhandled promise rejections or events
        window.addEventListener('unhandledrejection', function(event) {
          const msg = event.reason?.message || String(event.reason || '');
          if (msg.includes('WebSocket') || msg.includes('websocket') || msg.includes('vite') || msg.includes('closed without opened')) {
            event.preventDefault();
            event.stopImmediatePropagation();
          }
        }, true);
        window.addEventListener('error', function(event) {
          const msg = event.message || '';
          if (msg.includes('WebSocket') || msg.includes('websocket') || msg.includes('vite') || msg.includes('closed without opened')) {
            event.preventDefault();
            event.stopImmediatePropagation();
          }
        }, true);
      })();
    </script>
  </head>
  <body class="bg-[#0F172A] text-slate-100 min-h-screen antialiased selection:bg-blue-500/30 selection:text-blue-200">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
